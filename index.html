<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#17152f">
  <title>Grid Rush</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #fffaf0;
      --muted: #aaa6bd;
      --panel: rgba(35, 31, 65, .9);
      --panel-solid: #242040;
      --violet: #7868ff;
      --cyan: #51e5d3;
      --gold: #ffc84a;
      --red: #ff5571;
      --green: #54dea0;
      --shadow: 0 20px 60px rgba(5, 4, 18, .42);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      background: #15132b;
      color: var(--ink);
      font-family: ui-rounded, "SF Pro Rounded", "Nunito", system-ui, sans-serif;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      width: 55vmax;
      height: 55vmax;
      border-radius: 50%;
      filter: blur(80px);
      opacity: .19;
      pointer-events: none;
    }

    body::before { background: #734dff; top: -32vmax; left: -15vmax; }
    body::after { background: #00cdb7; right: -35vmax; bottom: -30vmax; }

    button {
      border: 0;
      font: inherit;
      color: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    button:focus-visible { outline: 3px solid var(--cyan); outline-offset: 3px; }

    .app {
      position: relative;
      isolation: isolate;
      width: min(100%, 560px);
      min-height: 100vh;
      min-height: 100dvh;
      margin: 0 auto;
      padding: max(18px, env(safe-area-inset-top)) max(18px, env(safe-area-inset-right)) max(18px, env(safe-area-inset-bottom)) max(18px, env(safe-area-inset-left));
      display: flex;
      flex-direction: column;
    }

    .screen {
      display: none;
      min-height: calc(100vh - 36px);
      min-height: calc(100dvh - 36px);
      flex-direction: column;
    }

    .screen.active { display: flex; }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: .82rem;
      font-weight: 900;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--cyan);
    }

    .brand-dot {
      width: 11px;
      height: 11px;
      border: 3px solid var(--cyan);
      border-radius: 50%;
      box-shadow: 0 0 18px var(--cyan);
    }

    .menu {
      justify-content: center;
      gap: 26px;
    }

    .hero-mark {
      width: 98px;
      height: 98px;
      display: grid;
      place-items: center;
      margin-bottom: 4px;
      border-radius: 30px;
      background: linear-gradient(145deg, #ffc84a, #ff865c);
      box-shadow: 0 18px 50px rgba(255, 165, 76, .28);
      transform: rotate(-5deg);
    }

    .hero-mark svg { width: 70px; filter: drop-shadow(0 6px 4px rgba(93, 37, 16, .18)); }

    h1 {
      max-width: 460px;
      margin: 0;
      font-size: clamp(3.4rem, 16vw, 6.2rem);
      line-height: .83;
      letter-spacing: -.075em;
    }

    h1 span { color: var(--gold); }

    .tagline {
      max-width: 390px;
      margin: -8px 0 0;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.5;
    }

    .primary,
    .secondary {
      min-height: 58px;
      border-radius: 18px;
      padding: 0 24px;
      font-weight: 900;
      transition: transform .12s ease, filter .12s ease;
    }

    .primary {
      background: linear-gradient(135deg, var(--violet), #9c5cff);
      box-shadow: 0 14px 28px rgba(106, 85, 255, .3);
    }

    .secondary { background: rgba(255, 255, 255, .08); color: var(--muted); }
    .primary:active, .secondary:active, .icon-button:active { transform: scale(.96); }

    .menu-actions { display: grid; gap: 11px; }

    .run-stats {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 15px 18px;
      border: 1px solid rgba(255, 255, 255, .09);
      border-radius: 16px;
      background: rgba(255, 255, 255, .055);
      color: var(--muted);
      font-weight: 900;
    }

    .game { gap: 12px; }

    .hud {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
    }

    .level-label { min-width: 54px; font-weight: 900; }

    .hud-spacer { min-width: 1px; }

    .icon-button {
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      border-radius: 15px;
      background: rgba(255, 255, 255, .08);
      font-size: 1.1rem;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      min-height: 28px;
      color: var(--muted);
      font-weight: 800;
    }

    .hearts { color: var(--red); letter-spacing: .14em; }

    .play-area {
      flex: 1;
      display: grid;
      place-items: center;
      min-height: 0;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .grid {
      --drain: 0;
      width: 100%;
      display: grid;
      gap: clamp(8px, 2.4vw, 14px);
      align-content: center;
      transition: opacity .18s ease, filter .18s ease, transform .18s ease;
    }

    .grid.inert { pointer-events: none; opacity: .44; filter: blur(1px); }
    .grid.failed { filter: grayscale(.7); opacity: .52; }

    .tile {
      position: relative;
      min-width: 48px;
      min-height: 48px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      overflow: hidden;
      border-radius: clamp(15px, 4vw, 24px);
      background: linear-gradient(145deg, rgba(255, 255, 255, .12), rgba(255, 255, 255, .045));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .12), 0 9px 20px rgba(5, 4, 18, .2);
      touch-action: manipulation;
    }

    .tile svg {
      position: relative;
      z-index: 1;
      width: 72%;
      height: 72%;
      pointer-events: none;
      filter: drop-shadow(0 6px 5px rgba(0, 0, 0, .18));
    }

    .tile-shade {
      position: absolute;
      z-index: 2;
      inset: 0;
      border-radius: inherit;
      background: rgba(13, 12, 30, .65);
      transform: scaleY(var(--drain));
      transform-origin: top;
      pointer-events: none;
      will-change: transform;
    }

    .grid.shade-amber .tile-shade { background: rgba(112, 75, 18, .65); }
    .grid.shade-danger .tile-shade {
      background: rgba(116, 18, 40, .65);
      animation: urgency .48s ease-in-out infinite alternate;
    }

    .tile.target::before,
    .tile.red::before {
      content: "";
      position: absolute;
      z-index: 3;
      inset: 7%;
      border-width: clamp(3px, .8vw, 5px);
      border-style: solid;
      border-radius: 50%;
      animation: ringPulse .78s ease-in-out infinite alternate;
      pointer-events: none;
    }

    .tile.target::before {
      border-color: var(--gold);
      box-shadow: 0 0 15px rgba(255, 200, 74, .8), inset 0 0 12px rgba(255, 200, 74, .32);
    }

    .tile.red::before {
      border-color: var(--red);
      border-style: dashed;
      box-shadow: 0 0 14px rgba(255, 85, 113, .72), inset 0 0 11px rgba(255, 85, 113, .28);
    }

    .tile.resolved { pointer-events: none; animation: resolve .18s ease forwards; }
    .tile.wobble { animation: wobble .22s ease; }
    .tile.red-hit { animation: redHit .18s ease; }
    .grid.shake { animation: shake .15s linear; }

    .time-delta {
      position: fixed;
      z-index: 20;
      font-size: 1.05rem;
      font-weight: 1000;
      pointer-events: none;
      animation: floatPenalty .6s ease-out forwards;
    }

    .time-delta.positive {
      color: var(--green);
      text-shadow: 0 0 16px rgba(84, 222, 160, .7);
    }

    .time-delta.negative { color: var(--red); }

    .wave-flash {
      position: absolute;
      inset: 0;
      z-index: 9;
      display: grid;
      place-items: center;
      color: var(--ink);
      font-size: clamp(2.5rem, 14vw, 5rem);
      font-weight: 1000;
      letter-spacing: -.06em;
      opacity: 0;
      transform: scale(.8);
      pointer-events: none;
      text-shadow: 0 12px 32px rgba(5, 4, 18, .7);
      transition: opacity .12s ease, transform .18s ease;
    }

    .wave-flash.visible {
      opacity: 1;
      transform: scale(1);
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: none;
      place-items: center;
      padding: 24px;
      background: rgba(15, 12, 35, .64);
      backdrop-filter: blur(10px);
    }

    .overlay.visible { display: grid; }

    .card {
      width: min(100%, 390px);
      padding: 30px;
      border: 1px solid rgba(255, 255, 255, .11);
      border-radius: 28px;
      background: var(--panel);
      box-shadow: var(--shadow);
      text-align: center;
      animation: cardIn .2s ease-out;
    }

    .card h2 { margin: 4px 0 8px; font-size: 2.2rem; letter-spacing: -.045em; }
    .card p { margin: 0 0 22px; color: var(--muted); line-height: 1.45; }
    .card-actions { display: grid; gap: 10px; }
    .result-icon { font-size: 3rem; }
    .stars { color: var(--gold); letter-spacing: .16em; animation: stars .45s ease both; }

    .dev-panel {
      position: absolute;
      inset: max(14px, env(safe-area-inset-top)) 14px max(14px, env(safe-area-inset-bottom));
      z-index: 30;
      display: none;
      flex-direction: column;
      gap: 14px;
      padding: 22px;
      border: 1px solid rgba(255, 255, 255, .11);
      border-radius: 24px;
      background: #211d3a;
      box-shadow: var(--shadow);
    }

    .dev-panel.visible { display: flex; }
    .dev-panel pre { flex: 1; overflow: auto; margin: 0; padding: 14px; border-radius: 14px; background: #121023; color: #c9ffef; font-size: .72rem; white-space: pre-wrap; }
    .dev-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .dev-note { margin: 0; color: var(--muted); font-size: .82rem; }

    .toast {
      position: fixed;
      z-index: 60;
      left: 50%;
      bottom: max(22px, env(safe-area-inset-bottom));
      padding: 11px 16px;
      border-radius: 999px;
      background: var(--ink);
      color: #17142f;
      font-weight: 900;
      transform: translate(-50%, 20px);
      opacity: 0;
      pointer-events: none;
      transition: .18s ease;
    }

    .toast.visible { transform: translate(-50%, 0); opacity: 1; }

    @keyframes ringPulse { to { transform: scale(1.055); opacity: .72; } }
    @keyframes urgency { to { opacity: .65; } }
    @keyframes resolve { 45% { transform: scale(1.12); } to { transform: scale(.25); opacity: 0; } }
    @keyframes wobble { 25% { transform: rotate(-5deg); } 65% { transform: rotate(5deg); } }
    @keyframes redHit { 50% { background: var(--red); transform: scale(.94); } }
    @keyframes shake { 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    @keyframes floatPenalty { to { transform: translateY(-45px); opacity: 0; } }
    @keyframes cardIn { from { transform: scale(.9); opacity: 0; } }
    @keyframes stars { from { transform: scale(.45); opacity: 0; } }

    @media (max-width: 400px) {
      .app {
        padding-left: max(14px, env(safe-area-inset-left));
        padding-right: max(14px, env(safe-area-inset-right));
      }
    }

    @media (max-height: 620px) {
      .app { padding-top: 10px; padding-bottom: 10px; }
      .hero-mark { width: 72px; height: 72px; }
      .hero-mark svg { width: 52px; }
      .menu { gap: 16px; }
      h1 { font-size: 3.4rem; }
      .tagline { font-size: .92rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; scroll-behavior: auto !important; }
      .tile.target::before,
      .tile.red::before { opacity: 1; transform: none; }
      .grid.shade-danger .tile-shade { opacity: .65; }
    }
  </style>
</head>
<body>
  <main class="app" id="app">
    <section class="screen menu active" id="menuScreen" aria-labelledby="gameTitle">
      <div class="brand"><span class="brand-dot"></span> Reflex protocol</div>
      <div class="hero-mark" aria-hidden="true" id="heroFace"></div>
      <h1 id="gameTitle">GRID<br><span>RUSH</span></h1>
      <p class="tagline">Tap solid gold rings. Dashed red rings end the run. Leave ringless faces.</p>
      <div class="menu-actions">
        <button class="primary" id="playButton">Start run</button>
        <button class="secondary" id="soundButton">Sound on</button>
        <button class="secondary" id="devButton" hidden>Development data</button>
      </div>
      <div class="run-stats" aria-label="Run records"><span id="bestStat">Best: Wave 0</span><span id="runsStat">Runs: 0</span></div>
    </section>

    <section class="screen game" id="gameScreen" aria-label="Grid Rush game">
      <header class="hud">
        <div class="level-label" id="levelLabel">W1</div>
        <div class="hud-spacer" aria-hidden="true"></div>
        <button class="icon-button" id="pauseButton" aria-label="Pause">Ⅱ</button>
      </header>
      <div class="meta"><span id="targetCount">3 faces left</span><span>Time bank</span></div>
      <div class="play-area"><div class="grid inert" id="grid" aria-label="Face grid"></div></div>
    </section>

    <div class="wave-flash" id="waveFlash" aria-live="polite"></div>

    <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="overlayTitle">
      <div class="card">
        <div class="result-icon" id="overlayIcon" aria-hidden="true"></div>
        <h2 id="overlayTitle"></h2>
        <p id="overlayText"></p>
        <div class="card-actions" id="overlayActions"></div>
      </div>
    </div>

    <aside class="dev-panel" id="devPanel" aria-label="Development telemetry">
      <h2>Development data</h2>
      <p class="dev-note">Stored only in this browser. Each record represents one complete arcade run.</p>
      <pre id="devOutput"></pre>
      <div class="dev-actions">
        <button class="primary" id="copyDevButton">Copy JSON</button>
        <button class="secondary" id="clearDevButton">Clear</button>
        <button class="secondary" id="closeDevButton">Close</button>
      </div>
    </aside>
  </main>
  <div class="toast" id="toast" role="status"></div>

  <script>
    'use strict';

    const ECON = {
      startBankMs: 6000,
      capMs: 9000,
      refundMs: n => Math.max(250, 500 - 20 * n),
      waveClearBonusMs: n => Math.max(350, 1200 - 100 * n),
      neutralPenaltyMs: 700
    };
    const RUN_HEARTS = 1;
    const SAVE_KEY = 'gridrush.v0';
    const DEV_KEY = 'gridrush.v1.telemetry';
    const PARAMS = new URLSearchParams(location.search);
    const DEV_MODE = PARAMS.get('dev') === '1';
    const RAW_SEED = PARAMS.get('seed');
    const PINNED_SEED = RAW_SEED !== null && Number.isFinite(Number(RAW_SEED))
      ? Number(RAW_SEED) >>> 0
      : null;
    const DEFAULT_SAVE = { bestWave: 0, runsPlayed: 0, settings: { sound: true }, schema: 2 };

    const el = {
      app: document.querySelector('#app'), menuScreen: document.querySelector('#menuScreen'),
      gameScreen: document.querySelector('#gameScreen'), heroFace: document.querySelector('#heroFace'),
      playButton: document.querySelector('#playButton'), soundButton: document.querySelector('#soundButton'),
      devButton: document.querySelector('#devButton'), bestStat: document.querySelector('#bestStat'),
      runsStat: document.querySelector('#runsStat'), levelLabel: document.querySelector('#levelLabel'),
      targetCount: document.querySelector('#targetCount'), pauseButton: document.querySelector('#pauseButton'),
      grid: document.querySelector('#grid'), waveFlash: document.querySelector('#waveFlash'),
      overlay: document.querySelector('#overlay'), overlayIcon: document.querySelector('#overlayIcon'),
      overlayTitle: document.querySelector('#overlayTitle'), overlayText: document.querySelector('#overlayText'),
      overlayActions: document.querySelector('#overlayActions'), devPanel: document.querySelector('#devPanel'),
      devOutput: document.querySelector('#devOutput'), copyDevButton: document.querySelector('#copyDevButton'),
      clearDevButton: document.querySelector('#clearDevButton'), closeDevButton: document.querySelector('#closeDevButton'),
      toast: document.querySelector('#toast')
    };

    let save = loadSave();
    let telemetry = DEV_MODE ? loadTelemetry() : [];
    let audioContext = null;
    let toastTimer = 0;
    let waveTransitionTimer = 0;
    let runCounter = 0;
    let hasShownRunIntro = false;

    const state = {
      phase: 'BOOT', wave: 1, config: null, runSeed: 0, waveSeed: 0, tiles: [],
      remainingTargets: 0, runHearts: RUN_HEARTS, bankMs: ECON.startBankMs,
      remaining: ECON.startBankMs, waveMaxBankMs: ECON.startBankMs,
      bankAtWaveEntryMs: ECON.startBankMs, lastTick: 0, rafId: null, runElapsedMs: 0,
      waveElapsedMs: 0, waveTaps: [], waveWrongTaps: 0, waveNeutralTaps: 0,
      waveRedTapsNearDrainCount: 0, streak: 0, shadeTone: 'normal',
      currentRecordId: null, runRecord: null, pauseAfterWave: false
    };

    function waveConfig(n) {
      const tiles = n <= 2 ? { cols: 3, rows: 3 }
        : n <= 4 ? { cols: 3, rows: 4 }
        : n <= 6 ? { cols: 4, rows: 4 }
        : n <= 8 ? { cols: 4, rows: 5 }
        : n <= 11 ? { cols: 5, rows: 5 }
        : n <= 14 ? { cols: 5, rows: 6 }
        : { cols: 6, rows: 6 };
      const total = tiles.cols * tiles.rows;
      const targets = Math.min(13, 3 + Math.floor(n * 0.5));
      const reds = Math.min(total - targets - 2, 1 + Math.floor(n * 0.65));
      return { n: n, cols: tiles.cols, rows: tiles.rows, targets: targets, reds: reds, neutrals: total - targets - reds };
    }

    function loadSave() {
      try {
        const value = JSON.parse(localStorage.getItem(SAVE_KEY));
        if (value && value.schema === 2) {
          return {
            bestWave: Math.max(0, Number(value.bestWave) || 0),
            runsPlayed: Math.max(0, Number(value.runsPlayed) || 0),
            settings: { sound: value.settings?.sound !== false },
            schema: 2
          };
        }
        if (value && value.schema === 1) {
          const migrated = { bestWave: 0, runsPlayed: 0, settings: { sound: value.settings?.sound !== false }, schema: 2 };
          localStorage.setItem(SAVE_KEY, JSON.stringify(migrated));
          return migrated;
        }
        throw new Error();
      } catch { return structuredClone(DEFAULT_SAVE); }
    }

    function persistSave() {
      try { localStorage.setItem(SAVE_KEY, JSON.stringify(save)); } catch { /* file scheme may reject storage */ }
    }

    function loadTelemetry() {
      try {
        const records = JSON.parse(localStorage.getItem(DEV_KEY)) || [];
        for (const record of records) if (record.nextAction === null) record.nextAction = 'abandoned';
        localStorage.setItem(DEV_KEY, JSON.stringify(records));
        return records;
      } catch { return []; }
    }

    function persistTelemetry() {
      if (!DEV_MODE) return;
      try { localStorage.setItem(DEV_KEY, JSON.stringify(telemetry)); } catch { /* local only best effort */ }
    }

    function mulberry32(seed) {
      return function () {
        let t = seed += 0x6D2B79F5;
        t = Math.imul(t ^ t >>> 15, t | 1);
        t ^= t + Math.imul(t ^ t >>> 7, t | 61);
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }

    function shuffle(items, rng) {
      for (let i = items.length - 1; i > 0; i -= 1) {
        const j = Math.floor(rng() * (i + 1));
        [items[i], items[j]] = [items[j], items[i]];
      }
      return items;
    }

    function faceSvg(kind, variant = 0) {
      const palette = kind === 'red'
        ? ['#ff5571', '#dd3657']
        : [['#55e3c1', '#25bfa6'], ['#79a8ff', '#5576dc'], ['#bd83ff', '#895dde'], ['#ffaf66', '#e77b4e']][variant % 4];
      const base = palette[0];
      const shade = palette[1];
      const brows = kind === 'red'
        ? '<path d="M21 27l10 4M49 27l-10 4" stroke="#511529" stroke-width="4.5" stroke-linecap="round"/>'
        : '';
      const mouth = kind === 'red'
        ? '<path d="M26 55 Q35 48 44 55" fill="none" stroke="#511529" stroke-width="4" stroke-linecap="round"/>'
        : variant % 2 === 0
          ? '<path d="M24 45c5 9 17 9 22 0" fill="none" stroke="#163b46" stroke-width="4" stroke-linecap="round"/>'
          : '<path d="M25 46c7 6 13 6 20 0" fill="none" stroke="#163b46" stroke-width="4" stroke-linecap="round"/>';
      return '<svg viewBox="0 0 70 70" aria-hidden="true"><defs><linearGradient id="g-' + kind + '-' + variant + '" x1="0" y1="0" x2="1" y2="1"><stop stop-color="' + base + '"/><stop offset="1" stop-color="' + shade + '"/></linearGradient></defs><circle cx="35" cy="35" r="27" fill="url(#g-' + kind + '-' + variant + ')"/><ellipse cx="26" cy="35" rx="3.4" ry="4.8" fill="' + (kind === 'red' ? '#511529' : '#163b46') + '"/><ellipse cx="44" cy="35" rx="3.4" ry="4.8" fill="' + (kind === 'red' ? '#511529' : '#163b46') + '"/>' + brows + mouth + '<circle cx="23" cy="24" r="5" fill="#fff" opacity=".2"/></svg>';
    }

    function setScreen(name) {
      el.menuScreen.classList.toggle('active', name === 'menu');
      el.gameScreen.classList.toggle('active', name === 'game');
    }

    function showMenu() {
      stopLoop();
      clearTimeout(waveTransitionTimer);
      state.phase = 'MENU';
      hideOverlay();
      el.waveFlash.classList.remove('visible');
      setScreen('menu');
      renderMenu();
    }

    function renderMenu() {
      el.playButton.textContent = 'Start run';
      el.soundButton.textContent = save.settings.sound ? 'Sound on' : 'Sound off';
      el.devButton.hidden = !DEV_MODE;
      el.bestStat.textContent = 'Best: Wave ' + save.bestWave;
      el.runsStat.textContent = 'Runs: ' + save.runsPlayed;
    }

    function startRun(showIntro = true) {
      unlockAudio();
      stopLoop();
      clearTimeout(waveTransitionTimer);
      setScreen('game');
      hideOverlay();
      el.waveFlash.classList.remove('visible');
      runCounter += 1;
      state.phase = 'RUN_INTRO';
      state.wave = 1;
      state.runSeed = PINNED_SEED ?? (Date.now() % 2147483648);
      state.bankMs = ECON.startBankMs;
      state.remaining = ECON.startBankMs;
      state.runHearts = RUN_HEARTS;
      state.runElapsedMs = 0;
      state.currentRecordId = null;
      state.runRecord = {
        id: String(Date.now()) + '-' + runCounter,
        runSeed: state.runSeed,
        outcome: null,
        waveReached: 1,
        durationMs: 0,
        waves: [],
        bankAtDeathMs: null,
        runNumber: runCounter,
        nextAction: null
      };
      buildWave(1);
      if (showIntro && !hasShownRunIntro) {
        hasShownRunIntro = true;
        showRunIntro();
      } else {
        startPlaying();
      }
    }

    function buildWave(n) {
      state.wave = n;
      state.config = waveConfig(n);
      state.bankAtWaveEntryMs = state.bankMs;
      state.waveMaxBankMs = Math.max(1, state.bankMs);
      state.waveSeed = (state.runSeed ^ Math.imul(n, 0x9E3779B9)) >>> 0;
      const rng = mulberry32(state.waveSeed);
      const kinds = [
        ...Array(state.config.targets).fill('target'),
        ...Array(state.config.reds).fill('red'),
        ...Array(state.config.neutrals).fill('neutral')
      ];
      shuffle(kinds, rng);
      state.tiles = kinds.map((kind, idx) => ({ idx: idx, kind: kind, resolved: false, faceVariant: Math.floor(rng() * 4), lastTapAt: -Infinity }));
      state.remainingTargets = state.config.targets;
      state.waveElapsedMs = 0;
      state.waveTaps = [];
      state.waveWrongTaps = 0;
      state.waveNeutralTaps = 0;
      state.waveRedTapsNearDrainCount = 0;
      state.streak = 0;
      state.shadeTone = 'unset';
      renderGrid();
      updateHud(state.bankMs);
    }

    function renderGrid() {
      el.grid.replaceChildren();
      el.grid.style.gridTemplateColumns = 'repeat(' + state.config.cols + ', 1fr)';
      el.grid.className = 'grid inert';
      for (const tile of state.tiles) {
        const button = document.createElement('button');
        button.className = 'tile ' + tile.kind;
        button.dataset.idx = tile.idx;
        button.setAttribute('aria-label', tile.kind === 'target' ? 'Solid gold ring target face' : tile.kind === 'red' ? 'Dashed red ring infected face' : 'Ringless bystander face');
        button.innerHTML = faceSvg(tile.kind, tile.faceVariant) + '<span class="tile-shade" aria-hidden="true"></span>';
        button.addEventListener('pointerdown', onTilePress);
        el.grid.append(button);
      }
    }

    function showRunIntro() {
      state.phase = 'RUN_INTRO';
      el.grid.classList.add('inert');
      showOverlay({
        icon: '◎',
        title: 'Ready?',
        text: 'Tap every solid gold ring · Dashed red rings end the run · No ring means leave it',
        actions: []
      });
      let dismissed = false;
      const dismiss = () => {
        if (dismissed || state.phase !== 'RUN_INTRO') return;
        dismissed = true;
        el.overlay.removeEventListener('pointerdown', dismiss);
        clearTimeout(timer);
        hideOverlay();
        startPlaying();
      };
      const timer = setTimeout(dismiss, 1400);
      el.overlay.addEventListener('pointerdown', dismiss, { once: true });
    }

    function startPlaying() {
      stopLoop();
      state.phase = 'PLAYING';
      state.lastTick = performance.now();
      el.grid.classList.remove('inert', 'failed');
      state.rafId = requestAnimationFrame(tick);
    }

    function drainBank(now) {
      if (state.phase !== 'PLAYING') return state.bankMs;
      const delta = Math.max(0, now - state.lastTick);
      state.bankMs -= delta;
      state.runElapsedMs += delta;
      state.waveElapsedMs += delta;
      state.lastTick = now;
      return state.bankMs;
    }

    function getBank(now = performance.now()) {
      return state.phase === 'PLAYING' ? state.bankMs - Math.max(0, now - state.lastTick) : state.bankMs;
    }

    function tick(now) {
      if (state.phase !== 'PLAYING') return;
      const bank = drainBank(now);
      updateHud(bank);
      if (bank <= 0) {
        runOver('timeout', now);
        return;
      }
      state.rafId = requestAnimationFrame(tick);
    }

    function addBank(amount) {
      state.bankMs = Math.min(ECON.capMs, state.bankMs + amount);
      if (state.phase === 'PLAYING') {
        state.waveMaxBankMs = Math.max(state.waveMaxBankMs, state.bankMs);
      }
      updateHud(state.bankMs);
    }

    function updateHud(bank) {
      state.remaining = Math.max(0, bank);
      const denominator = Math.max(1, state.waveMaxBankMs);
      const drain = 1 - Math.max(0, Math.min(1, state.remaining / denominator));
      el.grid.style.setProperty('--drain', String(drain));
      const nextTone = state.remaining <= 1800 ? 'danger' : state.remaining <= 3500 ? 'amber' : 'normal';
      if (nextTone !== state.shadeTone) {
        state.shadeTone = nextTone;
        el.grid.classList.toggle('shade-amber', nextTone === 'amber');
        el.grid.classList.toggle('shade-danger', nextTone === 'danger');
      }
      el.levelLabel.textContent = 'W' + state.wave;
      el.targetCount.textContent = state.remainingTargets + ' ' + (state.remainingTargets === 1 ? 'face' : 'faces') + ' left';
    }

    function onTilePress(event) {
      if (state.phase !== 'PLAYING') return;
      const node = event.currentTarget;
      const tile = state.tiles[Number(node.dataset.idx)];
      const now = performance.now();
      if (tile.resolved || now - tile.lastTapAt < 300) return;
      tile.lastTapAt = now;
      const liveBank = drainBank(now);
      if (liveBank <= 0) {
        runOver('timeout', now);
        return;
      }

      state.waveTaps.push({ kind: tile.kind, tMs: Math.round(state.waveElapsedMs) });

      if (tile.kind === 'target') {
        tile.resolved = true;
        state.remainingTargets -= 1;
        state.streak += 1;
        node.classList.add('resolved');
        const refund = ECON.refundMs(state.wave);
        addBank(refund);
        showTimeDelta(node, refund, true);
        tone(480 + state.streak * 70, .045, 'sine', .05);
        if (state.remainingTargets === 0) clearWave(now);
        return;
      }

      state.streak = 0;
      state.waveWrongTaps += 1;
      if (tile.kind === 'neutral') {
        state.waveNeutralTaps += 1;
        state.bankMs -= ECON.neutralPenaltyMs;
        node.classList.remove('wobble');
        void node.offsetWidth;
        node.classList.add('wobble');
        showTimeDelta(node, ECON.neutralPenaltyMs, false);
        tone(190, .08, 'triangle', .04);
        updateHud(state.bankMs);
        if (state.bankMs <= 0) runOver('timeout', performance.now());
        return;
      }

      state.runHearts -= 1;
      if (state.bankMs < 1800) state.waveRedTapsNearDrainCount += 1;
      node.classList.add('red-hit');
      el.grid.classList.add('shake');
      tone(92, .14, 'sawtooth', .055);
      if (state.runHearts <= 0) runOver('red_tap', performance.now());
    }

    function clearWave(now) {
      if (state.phase !== 'PLAYING') return;
      stopLoop();
      state.phase = 'WAVE_CLEAR';
      el.grid.classList.add('inert');
      const bonus = ECON.waveClearBonusMs(state.wave);
      addBank(bonus);
      showTimeDelta(el.targetCount, bonus, true);
      state.runRecord.waves.push({
        n: state.wave,
        clearMs: Math.round(state.waveElapsedMs),
        taps: state.waveTaps,
        wrongTaps: state.waveWrongTaps,
        neutralTaps: state.waveNeutralTaps,
        redTapsNearDrainCount: state.waveRedTapsNearDrainCount,
        waveMaxBankMs: Math.round(state.waveMaxBankMs),
        bankAtWaveEntryMs: Math.round(state.bankAtWaveEntryMs),
        bankAtClearMs: Math.round(state.bankMs)
      });
      const nextWave = state.wave + 1;
      el.waveFlash.textContent = 'Wave ' + nextWave;
      el.waveFlash.classList.add('visible');
      state.pauseAfterWave = document.hidden;
      waveTransitionTimer = setTimeout(() => {
        buildWave(nextWave);
        el.waveFlash.classList.remove('visible');
        if (state.pauseAfterWave || document.hidden) {
          state.pauseAfterWave = false;
          showPausedOverlay();
        } else {
          startPlaying();
        }
      }, 500);
    }

    function showTimeDelta(node, amount, positive) {
      const rect = node.getBoundingClientRect();
      const label = document.createElement('span');
      label.className = 'time-delta ' + (positive ? 'positive' : 'negative');
      label.textContent = (positive ? '+' : '−') + (amount / 1000).toFixed(1) + 's';
      label.style.left = Math.max(12, rect.left + rect.width / 2 - 24) + 'px';
      label.style.top = Math.max(18, rect.top + rect.height / 2) + 'px';
      document.body.append(label);
      setTimeout(() => label.remove(), 650);
    }

    function runOver(outcome, now) {
      if (state.phase !== 'PLAYING') return;
      drainBank(now);
      stopLoop();
      state.phase = 'RUN_OVER';
      el.grid.classList.add('inert', 'failed');
      if (state.runRecord.waves.at(-1)?.n !== state.wave) {
        state.runRecord.waves.push({
          n: state.wave,
          clearMs: null,
          taps: state.waveTaps,
          wrongTaps: state.waveWrongTaps,
          neutralTaps: state.waveNeutralTaps,
          redTapsNearDrainCount: state.waveRedTapsNearDrainCount,
          waveMaxBankMs: Math.round(state.waveMaxBankMs),
          bankAtWaveEntryMs: Math.round(state.bankAtWaveEntryMs),
          bankAtClearMs: null
        });
      }
      const previousBest = save.bestWave;
      save.bestWave = Math.max(save.bestWave, state.wave);
      save.runsPlayed += 1;
      persistSave();
      state.runRecord.outcome = outcome;
      state.runRecord.waveReached = state.wave;
      state.runRecord.durationMs = Math.round(state.runElapsedMs);
      state.runRecord.bankAtDeathMs = Math.round(state.bankMs);
      state.runRecord.isNewBest = state.wave > previousBest;
      recordRun();
      setTimeout(() => showRunOver(outcome, state.wave > previousBest), 120);
    }

    function recordRun() {
      if (!DEV_MODE) return;
      telemetry.push(state.runRecord);
      state.currentRecordId = state.runRecord.id;
      persistTelemetry();
    }

    function resolveNextAction(actionName) {
      if (!DEV_MODE || !state.currentRecordId) return;
      const record = telemetry.find(item => item.id === state.currentRecordId);
      if (record) record.nextAction = actionName;
      state.currentRecordId = null;
      persistTelemetry();
    }

    function showRunOver(outcome, isNewBest) {
      const title = outcome === 'timeout' ? 'Out of time!' : 'You tapped a Red!';
      const bestLine = isNewBest ? 'New best!' : 'Best: Wave ' + save.bestWave;
      showOverlay({
        icon: isNewBest ? '<span class="stars">★ NEW ★</span>' : outcome === 'timeout' ? '⌛' : '⚠',
        title: title,
        text: 'Wave ' + state.wave + ' reached · ' + bestLine,
        actions: [
          action('Run again', 'primary', retryRun),
          ...(DEV_MODE ? [action('Copy JSON', 'secondary', copyTelemetry)] : []),
          action('Menu', 'secondary', () => { resolveNextAction('quit'); showMenu(); })
        ]
      });
    }

    function retryRun() {
      resolveNextAction('retry');
      hideOverlay();
      el.grid.style.opacity = '0';
      setTimeout(() => {
        el.grid.style.opacity = '';
        startRun(false);
      }, 200);
    }

    function pauseGame() {
      if (state.phase !== 'PLAYING') return;
      drainBank(performance.now());
      stopLoop();
      showPausedOverlay();
    }

    function showPausedOverlay() {
      state.phase = 'PAUSED';
      el.grid.classList.add('inert');
      showOverlay({
        icon: 'Ⅱ',
        title: 'Paused',
        text: 'The time bank is frozen.',
        actions: [
          action('Resume', 'primary', resumeGame),
          action('Quit to menu', 'secondary', showMenu)
        ]
      });
    }

    function resumeGame() {
      if (state.phase !== 'PAUSED') return;
      hideOverlay();
      state.phase = 'PLAYING';
      state.lastTick = performance.now();
      el.grid.classList.remove('inert');
      state.rafId = requestAnimationFrame(tick);
    }

    function stopLoop() {
      if (state.rafId !== null) cancelAnimationFrame(state.rafId);
      state.rafId = null;
    }

    function showOverlay({ icon, title, text, actions }) {
      el.overlayIcon.innerHTML = icon;
      el.overlayTitle.textContent = title;
      el.overlayText.textContent = text;
      el.overlayActions.replaceChildren(...actions);
      el.overlay.classList.add('visible');
    }

    function hideOverlay() { el.overlay.classList.remove('visible'); }

    function action(label, className, handler) {
      const button = document.createElement('button');
      button.className = className;
      button.textContent = label;
      button.addEventListener('click', handler);
      return button;
    }

    function unlockAudio() {
      if (!save.settings.sound || audioContext) return;
      try { audioContext = new (window.AudioContext || window.webkitAudioContext)(); } catch { /* sound is optional */ }
    }

    function tone(frequency, duration, type = 'sine', gainValue = .04, delay = 0) {
      if (!save.settings.sound) return;
      unlockAudio();
      if (!audioContext) return;
      if (audioContext.state === 'suspended') audioContext.resume();
      const start = audioContext.currentTime + delay;
      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();
      oscillator.type = type;
      oscillator.frequency.setValueAtTime(frequency, start);
      gain.gain.setValueAtTime(gainValue, start);
      gain.gain.exponentialRampToValueAtTime(.0001, start + duration);
      oscillator.connect(gain).connect(audioContext.destination);
      oscillator.start(start);
      oscillator.stop(start + duration);
    }

    async function copyTelemetry() {
      const value = JSON.stringify(telemetry, null, 2);
      try { await navigator.clipboard.writeText(value); showToast('JSON copied'); }
      catch { showToast('Copy unavailable'); }
    }

    function openDevPanel() {
      el.devOutput.textContent = JSON.stringify(telemetry, null, 2) || '[]';
      el.devPanel.classList.add('visible');
    }

    function showToast(message) {
      clearTimeout(toastTimer);
      el.toast.textContent = message;
      el.toast.classList.add('visible');
      toastTimer = setTimeout(() => el.toast.classList.remove('visible'), 1300);
    }

    function boot() {
      el.heroFace.innerHTML = faceSvg('neutral', 3);
      el.playButton.addEventListener('click', () => startRun(true));
      el.soundButton.addEventListener('click', () => {
        save.settings.sound = !save.settings.sound;
        persistSave();
        renderMenu();
        if (save.settings.sound) { unlockAudio(); tone(440, .07); }
      });
      el.pauseButton.addEventListener('click', pauseGame);
      el.devButton.addEventListener('click', openDevPanel);
      el.copyDevButton.addEventListener('click', copyTelemetry);
      el.clearDevButton.addEventListener('click', () => { telemetry = []; persistTelemetry(); openDevPanel(); showToast('Data cleared'); });
      el.closeDevButton.addEventListener('click', () => el.devPanel.classList.remove('visible'));
      document.addEventListener('visibilitychange', () => {
        if (document.hidden && state.phase === 'PLAYING') pauseGame();
        if (document.hidden && state.phase === 'WAVE_CLEAR') state.pauseAfterWave = true;
      });
      showMenu();
    }

    boot();
  </script>
</body>
</html>
